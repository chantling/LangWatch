# LangWatch Configuration
# Copy this file to config.yaml and adjust settings.

# Directory where downloaded videos and generated files are saved.
download_dir: "./downloads"

# Maximum video resolution to download (e.g. 2160, 1080, 720, 480, 360).
video_resolution: 720

# Source language: the language of the video captions.
# Use "auto" to detect from video metadata, or an ISO 639-1 code (e.g. "de", "es", "fr").
source_language: "auto"

# Target language: your native language for translations and glosses (ISO 639-1 code).
target_language: "en"

# LLM settings. Define multiple APIs and switch between them with the "active" field
# or the --llm command-line flag.
llm:
  # Which API to use by default. Must match a key under "apis".
  active: "ollama-local"

  apis:
    ollama-local:
      api_base: "http://localhost:11434/v1"
      api_key: ""
      model: "llama3"
      # Maximum context window size in tokens for this model.
      # Used to auto-calculate batch sizes for API calls.
      max_context_window: 8192
      max_tokens_per_request: 4096
      temperature: 0.3
      max_retries: 2

    # Example: OpenAI
    # openai:
    #   api_base: "https://api.openai.com/v1"
    #   api_key: "sk-..."
    #   model: "gpt-4o"
    #   max_context_window: 128000
    #   max_tokens_per_request: 16384
    #   temperature: 0.3
    #   max_retries: 2

    # Example: z.ai GLM
    # zai-glm:
    #   api_base: "https://open.bigmodel.cn/api/paas/v4"
    #   api_key: "..."
    #   model: "glm-5.1"
    #   max_context_window: 200000
    #   max_tokens_per_request: 40960
    #   temperature: 0.3
    #   max_retries: 2

# Anki flashcard export settings.
anki:
  # Set to true to generate Anki-importable CSV.
  enabled: true

  # Field separator: "tab" or "semicolon".
  separator: "tab"

  # Minimum number of times a word must appear in the transcript to be considered.
  min_frequency: 2

  # Maximum number of vocabulary cards to export.
  max_words: 50
